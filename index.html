<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华容道</title>
    <style>
        :root { --primary: #4a90e2; --success: #4caf50; --empty: #eee; }
        body { font-family: system-ui; background: #fdf6e3; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        #game-board {
            display: grid; grid-template-columns: repeat(5, 65px); grid-template-rows: repeat(5, 65px);
            gap: 8px; background: #d3c6aa; padding: 10px; border-radius: 10px;
        }
        .tile {
            width: 65px; height: 65px; background: white; border-radius: 6px;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; font-weight: bold; cursor: pointer; transition: all 0.3s;
            box-shadow: 0 3px 0 #bbb; position: relative;
        }
        .tile.empty { background: var(--empty); box-shadow: none; }
        /* 胜利/匹配后的样式 */
        .tile.matched { background: var(--success) !important; color: white; transform: scale(1.05); z-index: 2; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .popover {
            position: absolute; bottom: 105%; background: #333; color: white;
            padding: 4px 8px; border-radius: 4px; font-size: 12px; display: none; pointer-events: none;
        }
        .tile:active .popover { display: block; }
        .score-board { margin: 15px; font-size: 1.2rem; font-weight: bold; color: #555; }
        button { padding: 10px 20px; border-radius: 20px; border: none; background: var(--primary); color: white; cursor: pointer; }
    </style>
</head>
<body>

    <h1>🧩 词语拼拼乐</h1>
    <div class="score-board">已找到词语: <span id="match-count">0</span> / 5</div>
    <div id="game-board"></div>
    <div style="margin-top:20px;">
        <button onclick="initGame()">换一组词</button>
    </div>

<script>
    // 词库
    const allVocabulary = [
        { word: "淘气", pinyin: "táo qì" }, { word: "两肋插刀", pinyin: "liǎng lèi chā dāo" },
        { word: "科技", pinyin: "kē jì" }, { word: "口头禅", pinyin: "kǒu tóu chán" },
        { word: "直率", pinyin: "zhí shuài" }, { word: "兴致勃勃", pinyin: "xìng zhì bó bó" },
        { word: "手足无措", pinyin: "shǒu zú wú cuò" }, { word: "哑口无言", pinyin: "yǎ kǒu wú yán" }
    ];

    const size = 5;
    let board = [];
    let currentVocab = [];

    function initGame() {
        // 随机选5个词进行挑战
        currentVocab = [...allVocabulary].sort(() => Math.random() - 0.5).slice(0, 5);
        let chars = [];
        currentVocab.forEach(v => {
            v.word.split('').forEach(c => chars.push({ char: c, py: v.pinyin, matched: false }));
        });

        // 补齐空格
        while(chars.length < 24) chars.push({ char: "学", py: "xué", matched: false });
        board = chars.slice(0, 24).map(item => ({ ...item, empty: false }));
        board.push({ char: "", empty: true });
        board.sort(() => Math.random() - 0.5);
        render();
    }

    function render() {
        const container = document.getElementById('game-board');
        container.innerHTML = '';
        
        // 渲染前检测胜负逻辑
        const matchedIndices = checkMatches();

        board.forEach((tile, index) => {
            const div = document.createElement('div');
            const isMatched = matchedIndices.has(index);
            div.className = `tile ${tile.empty ? 'empty' : ''} ${isMatched ? 'matched' : ''}`;
            div.innerHTML = tile.empty ? '' : `<div class="popover">${tile.py}</div>${tile.char}`;
            
            div.onclick = () => {
                const emptyIdx = board.findIndex(b => b.empty);
                if (isAdjacent(index, emptyIdx)) {
                    [board[index], board[emptyIdx]] = [board[emptyIdx], board[index]];
                    render();
                }
            };
            container.appendChild(div);
        });

        document.getElementById('match-count').innerText = currentVocab.filter(v => 
            board.map(b => b.char).join('').includes(v.word)
        ).length;
    }

    function isAdjacent(i1, i2) {
        const r1 = Math.floor(i1/size), c1 = i1%size;
        const r2 = Math.floor(i2/size), c2 = i2%size;
        return Math.abs(r1-r2) + Math.abs(c1-c2) === 1;
    }

    // 核心算法：检测横向是否有完整词语
    function checkMatches() {
        let matchedIndices = new Set();
        // 检查每一行
        for (let r = 0; r < size; r++) {
            let rowStr = "";
            for (let c = 0; c < size; c++) {
                rowStr += board[r * size + c].char || " ";
            }
            currentVocab.forEach(v => {
                const startIdx = rowStr.indexOf(v.word);
                if (startIdx !== -1) {
                    for (let i = 0; i < v.word.length; i++) {
                        matchedIndices.add(r * size + startIdx + i);
                    }
                }
            });
        }
        return matchedIndices;
    }

    initGame();
</script>
</body>
</html>
