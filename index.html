<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>华文词语消消乐 - 严谨版</title>
    <style>
        :root { --primary: #FF9800; --success: #4caf50; --bg-yellow: #FFF9C4; --glass: rgba(255, 255, 255, 0.85); --text-brown: #5D4037; }
        body { font-family: 'PingFang SC', sans-serif; background-color: var(--bg-yellow); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }
        #emoji-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .floating-emoji { position: absolute; font-size: 2rem; opacity: 0.2; animation: float linear infinite; }
        @keyframes float { from { transform: translateY(110vh); } to { transform: translateY(-10vh); } }
        
        .setup-bar { background: var(--glass); backdrop-filter: blur(12px); padding: 15px 20px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); margin: 15px; display: flex; gap: 10px; z-index: 10; border: 1px solid white; flex-wrap: wrap; justify-content: center; }
        #timer { font-size: 1.1rem; font-weight: bold; color: #E64A19; height: 1.5rem; }
        
        #game-board { display: grid; grid-template-columns: repeat(6, 55px); grid-template-rows: repeat(6, 55px); gap: 8px; background: rgba(255, 255, 255, 0.3); padding: 12px; border-radius: 18px; border: 2px solid white; display: none; }
        .tile { width: 55px; height: 55px; background: white; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 19px; color: var(--text-brown); cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 0 #ddd; }
        .tile.empty { visibility: hidden; }
        .tile.matched { background: var(--success) !important; color: white !important; font-weight: bold; animation: celebrate 0.5s ease; }
        @keyframes celebrate { 50% { transform: scale(1.1); } }
        
        select, button { padding: 10px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .btn-main { background: var(--primary); color: white; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 200; }
        .modal-content { background: white; padding: 25px; border-radius: 24px; text-align: center; width: 280px; }
        .meaning-box { text-align: left; background: #F5F5F5; padding: 12px; border-radius: 15px; margin-top: 10px; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div id="emoji-bg"></div>
    <h1>✨ 华文大闯关</h1>
    
    <div class="setup-bar">
        <select id="unit-select">
            <option value="unit1">单元一</option>
            <option value="unit2">单元二</option>
        </select>
        <select id="diff-select">
            <option value="5">5词</option>
            <option value="8">8词</option>
            <option value="11">11词</option>
        </select>
        <button class="btn-main" onclick="initGame()">开始</button>
    </div>

    <div id="timer"></div>
    <div id="game-board"></div>

    <div id="study-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-word" style="color:var(--primary); margin:0; font-size: 2rem;"></h2>
            <div id="modal-pinyin" style="color:#888; margin:5px 0 10px;"></div>
            <div id="modal-meaning" class="meaning-box"></div>
            <button class="btn-main" style="margin-top:15px; width:100%" onclick="closeModal()">OK</button>
        </div>
    </div>

    <script>
        const allUnitsData = {
            unit1: [
                { word: "淘气", pinyin: "táo qì", meaning: "顽皮；爱捣蛋。", meaning_en: "naughty; mischievous" },
                { word: "惹", pinyin: "rě", meaning: "招引；引起不快。", meaning_en: "provoke" },
                { word: "两肋插刀", pinyin: "liǎng lèi chā dāo", meaning: "为朋友牺牲自己。", meaning_en: "sacrifice for friends" },
                { word: "直率", pinyin: "zhí shuài", meaning: "坦率；直爽。", meaning_en: "candid; frank" },
                { word: "口头禅", pinyin: "kǒu tóu chán", meaning: "挂在嘴边的习惯语。", meaning_en: "catchphrase; mantra" },
                { word: "人缘", pinyin: "rén yuán", meaning: "指与周围人的关系。", meaning_en: "relations with other people" },
                { word: "性格", pinyin: "xìng gé", meaning: "心理特征。", meaning_en: "nature; character" },
                { word: "得罪", pinyin: "dé zuì", meaning: "触犯；使不愉快。", meaning_en: "to commit an offense" },
                { word: "别扭", pinyin: "biè niu", meaning: "不顺心；拘束。", meaning_en: "awkward" },
                { word: "争辩", pinyin: "zhēng biàn", meaning: "争论辩驳。", meaning_en: "a dispute" },
                { word: "冤枉", pinyin: "yuān wang", meaning: "受到不公平待遇。", meaning_en: "accuse wrongly" }
            ],
            unit2: [
                { word: "瞬间", pinyin: "shùn jiān" , meaning: "一刹那。", meaning_en: "in an instant" },
                { word: "粘", pinyin: "zhān", meaning: "附着。", meaning_en: "to stick" },
                { word: "兴致勃勃", pinyin: "xìng zhì bó bó", meaning: "兴趣非常浓厚。", meaning_en: "in high spirits" },
                { word: "狼狈", pinyin: "láng bèi", meaning: "受窘的样子。", meaning_en: "in a difficult situation" },
                { word: "蛋液", pinyin: "dàn yè", meaning: "鸡蛋内的液体。", meaning_en: "liquid of the egg" },
                { word: "讥讽", pinyin: "jī fěng", meaning: "嘲笑讽刺。", meaning_en: "to ridicule" },
                { word: "赌气", pinyin: "dǔ qì", meaning: "因不满意而行动。", meaning_en: "act in pique" },
                { word: "嚷", pinyin: "rǎng", meaning: "大声叫喊。", meaning_en: "to shout" },
                { word: "小心翼翼", pinyin: "xiǎo xīn yì yì", meaning: "非常小心。", meaning_en: "very carefully" },
                { word: "荧光笔", pinyin: "yíng guāng bǐ", meaning: "标记用的笔。", meaning_en: "highlighter" },
                { word: "抵挡", pinyin: "dǐ dǎng", meaning: "阻挡。", meaning_en: "to resist" },
                { word: "手足无措", pinyin: "shǒu zú wú cuò", meaning: "形容慌乱。", meaning_en: "at a loss" }
            ]
        };

        // 【优化】使用高频无实际意义的单字作为干扰项，避免意外组词
        const safeFillers = "的一了是在我有个他到这们中大为上国地成行时用后出".split('');
        let board = [], targetWords = [], timerPtr = null, timeLeft = 0, isPaused = false;

        function initGame() {
            const unitKey = document.getElementById('unit-select').value;
            const diff = parseInt(document.getElementById('diff-select').value);
            const validTargets = allUnitsData[unitKey].filter(item => item.word.length >= 2);
            targetWords = [...validTargets].sort(() => Math.random() - 0.5).slice(0, diff);
            
            clearInterval(timerPtr);
            timeLeft = (diff === 8) ? 120 : (diff === 11 ? 180 : 0);
            
            let chars = [];
            targetWords.forEach(v => v.word.split('').forEach(c => chars.push({char:c, wordObj:v, isTarget:true})));
            
            // 填充剩余空格
            while(chars.length < 35) {
                // 确保随机选出的干扰字不在当前目标词汇的字符中，防止误导
                let f = safeFillers[Math.floor(Math.random()*safeFillers.length)];
                chars.push({char: f, isTarget: false, empty: false});
            }
            chars.push({char: "", isTarget: false, empty: true}); 
            board = chars.sort(() => Math.random() - 0.5);
            
            document.querySelector('.setup-bar').style.display = 'none';
            document.getElementById('game-board').style.display = 'grid';
            render();
            if(timeLeft > 0) startTimer();
        }

        function startTimer() {
            timerPtr = setInterval(() => {
                if(!isPaused) {
                    timeLeft--;
                    document.getElementById('timer').innerText = `⏰ 倒计时: ${timeLeft}s`;
                    if(timeLeft <= 0) { clearInterval(timerPtr); alert("时间到！"); location.reload(); }
                }
            }, 1000);
        }

        function render() {
            const container = document.getElementById('game-board');
            container.innerHTML = '';
            board.forEach((tile, i) => {
                const div = document.createElement('div');
                div.className = `tile ${tile.empty ? 'empty' : ''}`;
                div.innerText = tile.char;
                div.onclick = () => moveTile(i);
                container.appendChild(div);
            });
            checkMatches();
        }

        function moveTile(idx) {
            if (board[idx].empty || isPaused) return;
            const emptyIdx = board.findIndex(b => b.empty);
            const r1 = Math.floor(idx/6), c1 = idx%6, r2 = Math.floor(emptyIdx/6), c2 = emptyIdx%6;
            if (Math.abs(r1-r2) + Math.abs(c1-c2) === 1) {
                [board[idx], board[emptyIdx]] = [board[emptyIdx], board[idx]];
                render();
            }
        }

        function checkMatches() {
            const tiles = document.querySelectorAll('.tile');
            targetWords.forEach((v, vIdx) => {
                let matchedIndices = [];
                // 横向
                for (let r = 0; r < 6; r++) {
                    let rowStr = "";
                    for (let c = 0; c < 6; c++) rowStr += (board[r*6+c].isTarget ? board[r*6+c].char : " ");
                    const s = rowStr.indexOf(v.word);
                    if (s !== -1) {
                        for(let i=0; i<v.word.length; i++) matchedIndices.push(r*6 + s + i);
                        break;
                    }
                }
                // 纵向
                if (matchedIndices.length === 0) {
                    for (let c = 0; c < 6; c++) {
                        let colStr = "";
                        for (let r = 0; r < 6; r++) colStr += (board[r*6+c].isTarget ? board[r*6+c].char : " ");
                        const s = colStr.indexOf(v.word);
                        if (s !== -1) {
                            for(let i=0; i<v.word.length; i++) matchedIndices.push((s + i)*6 + c);
                            break;
                        }
                    }
                }

                if (matchedIndices.length > 0) {
                    isPaused = true;
                    matchedIndices.forEach(idx => tiles[idx].classList.add('matched'));
                    setTimeout(() => {
                        document.getElementById('modal-word').innerText = v.word;
                        document.getElementById('modal-pinyin').innerText = v.pinyin;
                        document.getElementById('modal-meaning').innerHTML = `
                            <div>${v.meaning}</div>
                            <div style="color:#999;font-size:0.85em;margin-top:8px;border-top:1px solid #eee;padding-top:8px;">${v.meaning_en}</div>
                        `;
                        document.getElementById('study-modal').style.display = 'flex';
                        matchedIndices.forEach(idx => {
                            board[idx] = {char: safeFillers[Math.floor(Math.random()*safeFillers.length)], isTarget: false};
                        });
                    }, 500);
                    targetWords.splice(vIdx, 1);
                }
            });
        }

        function closeModal() {
            document.getElementById('study-modal').style.display = 'none';
            isPaused = false;
            render();
            if(targetWords.length === 0) { clearInterval(timerPtr); alert("全部找齐了！"); location.reload(); }
        }
    </script>
</body>
</html>
