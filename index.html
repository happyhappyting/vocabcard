<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>华文词语大挑战 - 全屏适配版</title>
    <style>
        :root { 
            --primary: #FF9800; 
            --success: #4caf50; 
            --bg-color: #C7EDCC; /* 豆沙绿 */
            --text-color: #333; 
            --wave-color: #2196F3; 
            --font-family: 'PingFang SC', "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body { 
            font-family: var(--font-family); 
            background-color: var(--bg-color); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            color: var(--text-color); 
            overflow-x: hidden;
            position: relative;
        }

        /* 🌊 左右两边的蓝色波浪线条 - 始终贴边 🌊 */
        body::before, body::after {
            content: "";
            position: fixed;
            top: 0;
            width: 4vw; /* 宽度随屏幕缩放 */
            min-width: 30px;
            height: 100%;
            background-repeat: repeat-y;
            background-size: 100% 120px;
            opacity: 0.5;
            z-index: -1;
            pointer-events: none;
        }
        body::before {
            left: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 100"><path d="M0 0 Q 35 25, 0 50 T 0 100" stroke="%232196F3" stroke-width="3" fill="none"/></svg>');
        }
        body::after {
            right: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 100"><path d="M50 0 Q 15 25, 50 50 T 50 100" stroke="%232196F3" stroke-width="3" fill="none"/></svg>');
        }

        /* 💻 全屏自适应主容器 💻 */
        #main-container {
            width: 90vw; /* 占据屏幕 90% 宽度 */
            max-width: 1200px; /* 在超大显示器上限制最大宽度以免太散 */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            box-sizing: border-box;
            flex-grow: 1;
        }

        /* 登录与难度选择 */
        #login-screen { position: fixed; inset: 0; background-color: var(--bg-color); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .setup-box { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); text-align: center; width: 320px; }
        
        input, select { 
            font-family: var(--font-family); 
            padding: 15px; 
            border: 2px solid #eee; 
            border-radius: 12px; 
            width: 100%; 
            font-size: 18px; 
            margin-bottom: 20px; 
            box-sizing: border-box;
            outline: none;
        }

        /* 状态栏：iPad/电脑上横向铺开 */
        .header { 
            background: rgba(255,255,255,0.6); 
            width: 100%; 
            padding: 15px 0; 
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .info-grid { 
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            font-weight: bold; 
            font-size: clamp(16px, 2vw, 24px); /* 字体随屏幕缩放 */
        }

        /* 🎮 核心：大屏自适应游戏板 🎮 */
        #game-board { 
            display: grid; 
            grid-template-columns: repeat(8, 1fr); 
            gap: 1.5vw; /* 间距随屏幕缩放 */
            background: rgba(255,255,255,0.3); 
            padding: 2vw; 
            border-radius: 25px; 
            border: 5px solid white; 
            width: 100%; 
            box-sizing: border-box;
            margin-bottom: 30px;
        }

        /* 正方形方块逻辑 */
        .tile { 
            width: 100%; 
            aspect-ratio: 1 / 1; /* 现代浏览器支持，确保正方形 */
            background: white; 
            border-radius: clamp(8px, 1.5vw, 15px); 
            cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 0.5vw 0 #bbb; 
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .tile-content { 
            font-size: clamp(18px, 3.5vw, 45px); /* 文字根据方块大小智能调整 */
            color: black;
            font-weight: 500;
        }

        /* 难度样式 */
        .easy-mode .tile.target .tile-content { color: var(--primary) !important; font-weight: 800 !important; }
        .hard-mode .tile .tile-content { color: black !important; font-weight: 500 !important; }

        .tile:hover { transform: translateY(-3px); }
        .tile.active { background: #FFEB3B; transform: scale(1.1); box-shadow: 0 0 20px var(--primary); z-index: 5; }
        .tile.matched { transform: scale(0); opacity: 0; }

        /* 弹窗适配大屏 */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 500; }
        .modal-content { 
            background: white; 
            padding: 40px; 
            border-radius: 30px; 
            text-align: center; 
            width: 90%; 
            max-width: 500px; 
        }
        .meaning-box { text-align: left; background: #f7f7f7; padding: 25px; border-radius: 20px; margin: 20px 0; font-size: clamp(16px, 1.5vw, 22px); border-left: 8px solid var(--primary); }

        button { 
            font-family: var(--font-family); 
            padding: 18px 40px; 
            border-radius: 15px; 
            border: none; 
            background: var(--primary); 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: clamp(18px, 1.5vw, 22px);
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }

        /* 结算界面大屏优化 */
        .result-card { 
            background: var(--bg-color); 
            padding: 60px; 
            border-radius: 40px; 
            border: 8px solid var(--primary); 
            width: 80%; 
            max-width: 600px; 
        }
        .score-big { font-size: clamp(80px, 10vw, 150px); font-weight: 900; color: var(--primary); margin: 20px 0; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="login-screen">
            <div class="setup-box">
                <h1 style="font-size: 28px; margin-bottom: 30px;">🦁 华文词语挑战</h1>
                <input type="text" id="player-name" placeholder="输入姓名" maxlength="10">
                <select id="level-select">
                    <option value="hard">进阶版 (全黑/5分)</option>
                    <option value="easy">简单版 (加粗/3分)</option>
                </select>
                <button onclick="startGame()">开始挑战</button>
                <p id="today-date" style="margin-top:20px; color:#666; font-size:16px"></p>
            </div>
        </div>

        <div id="game-container" style="display:none; width: 100%;">
            <div class="header">
                <div class="info-grid">
                    <span>👤 <span id="p-name"></span></span>
                    <span id="game-date" style="font-weight: normal; font-size: 0.8em; opacity: 0.7;"></span>
                    <span>⏰ <span id="timer">05:00</span></span>
                    <span>🏆 <span id="score">0</span></span>
                </div>
            </div>
            <div id="game-board"></div>
        </div>

        <div id="result-screen" style="position: fixed; inset: 0; background: white; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center;">
            <div class="result-card" style="text-align: center;">
                <h2 id="res-date" style="color: #888; font-weight: normal;"></h2>
                <h3 id="res-name" style="font-size: 32px; margin: 10px 0;"></h3>
                <div class="score-big" id="res-score">0分</div>
                <div id="res-msg" style="font-size: 24px; margin-bottom: 40px; line-height: 1.5;"></div>
                <button onclick="location.reload()" style="width: 100%;">回到首页</button>
            </div>
        </div>

        <div id="study-modal" class="modal">
            <div class="modal-content">
                <button onclick="speakWord()" style="background:#2196F3; border-radius:50%; width:60px; height:60px; padding:0; margin-bottom:15px; font-size:30px">🔊</button>
                <h2 id="m-word" style="font-size: 4rem; margin:10px 0;"></h2>
                <p id="m-pinyin" style="color:var(--primary); font-size: 1.8rem; margin:0"></p>
                <div class="meaning-box">
                    <div id="m-cn" style="font-weight:bold; font-size: 1.2em; margin-bottom:10px;"></div>
                    <div id="m-en" style="color:#666; font-style:italic;"></div>
                </div>
                <button onclick="closeModal()" style="width: 100%;">记住了！继续挑战</button>
            </div>
        </div>
    </div>

    <script>
        const wordBank = [
            { word: "淘气", pinyin: "táo qì", cn: "顽皮；爱捣蛋。", en: "naughty" },
            { word: "直率", pinyin: "zhí shuài", cn: "坦率；直爽。", en: "candid" },
            { word: "性格", pinyin: "xìng gé", cn: "心理特征。", en: "nature" },
            { word: "得罪", pinyin: "dé zuì", cn: "触犯；使不愉快。", en: "offend" },
            { word: "别扭", pinyin: "biè niu", cn: "不顺心；拘束。", en: "awkward" },
            { word: "争辩", pinyin: "zhēng biàn", cn: "争论辩驳。", en: "dispute" },
            { word: "瞬间", pinyin: "shùn jiān", cn: "极短的时间。", en: "instant" },
            { word: "兴致勃勃", pinyin: "xìng zhì bó bó", cn: "兴趣非常浓厚。", en: "high spirits" },
            { word: "狼狈", pinyin: "láng bèi", cn: "受窘的样子。", en: "difficult situation" },
            { word: "讥讽", pinyin: "jī fěng", cn: "嘲笑讽刺。", en: "ridicule" },
            { word: "赌气", pinyin: "dǔ qì", cn: "因不满意而行动。", en: "act in pique" },
            { word: "小心翼翼", pinyin: "xiǎo xīn yì yì", cn: "非常小心。", en: "very carefully" },
            { word: "手足无措", pinyin: "shǒu zú wú cuò", cn: "形容慌乱。", en: "at a loss" },
            { word: "冤枉", pinyin: "yuān wang", cn: "受到不公平待遇。", en: "accuse wrongly" },
            { word: "推荐", pinyin: "tuī jiàn", cn: "介绍。", en: "recommend" },
            { word: "捣乱", pinyin: "dǎo luàn", cn: "进行破坏。", en: "disturb" },
            { word: "人缘", pinyin: "rén yuán", cn: "与人的关系。", en: "relations" },
            { word: "口头禅", pinyin: "kǒu tóu chán", cn: "习惯语。", en: "catchphrase" },
            { word: "抵挡", pinyin: "dǐ dǎng", cn: "挡住；阻挡。", en: "resist" },
            { word: "拉扯", pinyin: "lā che", cn: "用力拉住。", en: "pull" }
        ];

        const fillers = "的一是在了我不有个他这到们中上大为国地来这了啊嗄以成行时用后".split('');
        let board = [], selectedPath = [], score = 0, timeLeft = 300, timerPtr = null;
        let gameMode = 'hard', perScore = 5;

        const today = new Date();
        const dateStr = `${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}`;
        document.getElementById('today-date').innerText = "今天是: " + dateStr;
        document.getElementById('game-date').innerText = dateStr;

        function startGame() {
            const name = document.getElementById('player-name').value.trim();
            if(!name) return alert("请输入姓名！");
            gameMode = document.getElementById('level-select').value;
            perScore = (gameMode === 'easy') ? 3 : 5;
            
            document.getElementById('p-name').innerText = name;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            document.getElementById('game-board').className = gameMode === 'easy' ? 'easy-mode' : 'hard-mode';
            
            initBoard();
            timerPtr = setInterval(updateTimer, 1000);
        }

        function initBoard() {
            let chars = [];
            const targets = [...wordBank].sort(() => Math.random() - 0.5).slice(0, 20);
            targets.forEach(v => {
                v.word.split('').forEach((c, idx) => chars.push({ char: c, wordObj: v, charIdx: idx }));
            });
            while(chars.length < 64) {
                chars.push({ char: fillers[Math.floor(Math.random()*fillers.length)], wordObj: null });
            }
            board = chars.sort(() => Math.random() - 0.5);
            render();
        }

        function render() {
            const container = document.getElementById('game-board');
            container.innerHTML = '';
            board.forEach((tile, i) => {
                const div = document.createElement('div');
                div.className = `tile ${tile.wordObj ? 'target' : ''} ${selectedPath.includes(i) ? 'active' : ''}`;
                const inner = document.createElement('div');
                inner.className = 'tile-content';
                inner.innerText = tile.char;
                div.appendChild(inner);
                div.onclick = () => handleSelect(i);
                container.appendChild(div);
            });
        }

        function handleSelect(idx) {
            const tile = board[idx];
            if (!tile.wordObj) { selectedPath = []; render(); return; }

            const expectedIdx = selectedPath.length;
            if (tile.charIdx === expectedIdx) {
                if (expectedIdx > 0) {
                    if (tile.wordObj.word !== board[selectedPath[0]].wordObj.word) selectedPath = [idx];
                    else selectedPath.push(idx);
                } else selectedPath.push(idx);
            } else selectedPath = (tile.charIdx === 0) ? [idx] : [];

            render();
            if (selectedPath.length === tile.wordObj.word.length) {
                score += perScore;
                document.getElementById('score').innerText = score;
                speak(tile.wordObj.word);
                setTimeout(() => showModal(tile.wordObj), 300);
            }
        }

        function showModal(v) {
            document.getElementById('m-word').innerText = v.word;
            document.getElementById('m-pinyin').innerText = v.pinyin;
            document.getElementById('m-cn').innerText = v.cn;
            document.getElementById('m-en').innerText = v.en;
            document.getElementById('study-modal').style.display = 'flex';
        }

        function closeModal() {
            selectedPath.forEach(idx => board[idx] = { char: fillers[Math.floor(Math.random()*fillers.length)], wordObj: null });
            selectedPath = [];
            document.getElementById('study-modal').style.display = 'none';
            render();
            const maxScore = (gameMode === 'easy' ? 60 : 100);
            if (score >= maxScore) endGame();
        }

        function updateTimer() {
            if (document.getElementById('study-modal').style.display === 'flex') return;
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
            if (timeLeft <= 0) endGame();
        }

        function endGame() {
            clearInterval(timerPtr);
            document.getElementById('game-container').style.display = 'none';
            const rs = document.getElementById('result-screen');
            rs.style.display = 'flex';
            document.getElementById('res-date').innerText = dateStr;
            document.getElementById('res-name').innerText = document.getElementById('p-name').innerText;
            document.getElementById('res-score').innerText = score + "分";
            
            const msg = document.getElementById('res-msg');
            const pct = score / (gameMode === 'easy' ? 60 : 100);
            if(pct >= 1) msg.innerHTML = "🏆 完美无缺！<br>你已经是词语大师了！✨🔥";
            else if(pct >= 0.8) msg.innerHTML = "🌟 表现优秀！<br>离满分只差一点点啦！👏";
            else if(pct >= 0.5) msg.innerHTML = "👍 成功及格！<br>继续保持学习的劲头！💪";
            else msg.innerHTML = "🌱 没关系，再接再厉！<br>多记几个词语就能及格啦！📖";
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-CN';
            window.speechSynthesis.speak(msg);
        }
        function speakWord() { speak(document.getElementById('m-word').innerText); }
    </script>
</body>
</html>
