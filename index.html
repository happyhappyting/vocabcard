<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中学华文词语挑战</title>
    <style>
        :root { 
            --primary: #FF9800; 
            --success: #4caf50; 
            --bg: #FFF9C4; 
            --text: #333; 
            --font-main: 'PingFang SC', "Microsoft YaHei", sans-serif;
        }

        body { 
            font-family: var(--font-main); 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            color: var(--text); 
            padding: 20px; /* 确保四周永远有间隙 */
            box-sizing: border-box;
        }

        /* 登录界面 */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .setup-box { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 280px; }
        input, select { padding: 12px; border: 2px solid #eee; border-radius: 12px; width: 100%; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; outline: none; }

        /* 游戏容器自适应 */
        #game-container { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
            max-width: 500px; /* 限制宽度，防止iPad上太撑 */
        }

        /* 整合顶栏 */
        .game-header { 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(255,255,255,0.6);
            padding: 10px 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: bold;
            box-sizing: border-box;
        }

        /* 游戏板：解决错位 */
        #game-board { 
            display: grid; 
            grid-template-columns: repeat(8, 1fr); 
            grid-template-rows: repeat(8, 1fr); 
            gap: 4px; 
            background: rgba(255,255,255,0.4); 
            padding: 10px; 
            border-radius: 20px; 
            border: 4px solid white; 
            width: 100%;
            aspect-ratio: 1 / 1; /* 锁定正方形 */
            box-sizing: border-box;
        }

        .tile { 
            background: white; 
            border-radius: 6px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: clamp(14px, 4.5vw, 20px); 
            cursor: pointer; 
            transition: 0.2s; 
            box-shadow: 0 3px 0 #ccc; 
            color: black; 
            font-weight: normal;
            user-select: none;
        }
        
        /* 难度样式 */
        .easy-mode .tile.target { color: var(--primary); font-weight: bold; }
        .hard-mode .tile { color: black !important; font-weight: normal !important; }

        .tile.active { background: #FFEB3B; transform: scale(1.05); box-shadow: 0 0 10px var(--primary); z-index: 5; }
        .tile.matched { transform: scale(0); opacity: 0; pointer-events: none; }

        /* 新增栏目：我找到了 */
        .found-section { width: 100%; margin-top: 25px; text-align: left; }
        .found-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; display: block; }
        .found-table { 
            width: 100%; 
            border-collapse: separate; 
            border-spacing: 5px; 
            table-layout: fixed;
        }
        .found-table td { 
            background: white; 
            border-radius: 8px; 
            padding: 8px 4px; 
            text-align: center; 
            border: 1px solid #ddd;
            height: 50px;
        }
        .found-word { font-weight: bold; display: block; font-size: 15px; }
        .found-pinyin { font-size: 11px; color: var(--primary); display: block; }

        /* 弹窗与结算 */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 500; }
        .modal-content { background: white; padding: 30px; border-radius: 25px; text-align: center; width: 280px; }
        #result-screen { position: fixed; inset: 0; background: white; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .result-card { background: var(--bg); padding: 40px; border-radius: 30px; border: 5px solid var(--primary); width: 85%; max-width: 400px; }
        .score-big { font-size: 70px; font-weight: 900; color: var(--primary); margin: 15px 0; }
        
        button { padding: 12px 30px; border-radius: 15px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; }
        .tts-btn { background: #2196F3; width: 50px; height: 50px; border-radius: 50%; margin-bottom: 10px; font-size: 24px; color: white; border:none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="setup-box">
            <h1 style="margin:0 0 15px 0">📚 华文闯关</h1>
            <p id="today-date" style="color:#666; font-size:14px; margin-bottom:20px"></p>
            <input type="text" id="player-name" placeholder="请输入姓名" maxlength="10">
            <select id="level-select">
                <option value="hard">进阶版 (全黑/5分/100满)</option>
                <option value="easy">简单版 (加粗/3分/60满)</option>
            </select>
            <button onclick="startGame()">进入挑战</button>
        </div>
    </div>

    <div id="game-container">
        <div class="game-header">
            <div>👤 <span id="p-name"></span></div>
            <div id="game-date" style="color:#888; font-size:12px"></div>
            <div>⏰ <span id="timer">05:00</span></div>
            <div>🏆 <span id="score">0</span>分</div>
        </div>

        <div id="game-board"></div>

        <div class="found-section">
            <span class="found-title">我找到了！</span>
            <table class="found-table" id="found-list">
                </table>
        </div>
    </div>

    <div id="result-screen">
        <div class="result-card">
            <h2 id="res-date" style="margin:0; color:#666; font-size:14px"></h2>
            <h3 id="res-name" style="margin:10px 0; font-size:22px"></h3>
            <div class="score-big" id="res-score">0</div>
            <div id="res-msg" style="font-size:16px; line-height:1.6; margin-bottom:20px"></div>
            <button onclick="location.reload()">重新挑战</button>
        </div>
    </div>

    <div id="study-modal" class="modal">
        <div class="modal-content">
            <button class="tts-btn" onclick="speakWord()">🔊</button>
            <h2 id="m-word" style="font-size: 2.2rem; margin:10px 0"></h2>
            <p id="m-pinyin" style="color:var(--primary); font-size: 1.1rem;"></p>
            <div style="text-align:left; background:#f9f9f9; padding:15px; border-radius:15px; margin:15px 0">
                <div id="m-cn" style="font-weight:bold; font-size:14px"></div>
                <div id="m-en" style="color:#888; font-size:12px; margin-top:5px"></div>
            </div>
            <button onclick="closeModal()">记住了</button>
        </div>
    </div>

    <script>
        const wordBank = [
            { word: "淘气", pinyin: "táo qì", cn: "顽皮；爱捣蛋。", en: "naughty" },
            { word: "直率", pinyin: "zhí shuài", cn: "坦率；直爽。", en: "candid" },
            { word: "性格", pinyin: "xìng gé", cn: "心理特征。", en: "nature" },
            { word: "得罪", pinyin: "dé zuì", cn: "触犯；使不愉快。", en: "offend" },
            { word: "别扭", pinyin: "biè niu", cn: "不顺心；拘束。", en: "awkward" },
            { word: "争辩", pinyin: "zhēng biàn", cn: "争论辩驳。", en: "dispute" },
            { word: "瞬间", pinyin: "shùn jiān", cn: "极短的时间。", en: "instant" },
            { word: "兴致勃勃", pinyin: "xìng zhì bó bó", cn: "兴趣非常浓厚。", en: "high spirits" },
            { word: "狼狈", pinyin: "láng bèi", cn: "受窘的样子。", en: "difficult situation" },
            { word: "讥讽", pinyin: "jī fěng", cn: "嘲笑讽刺。", en: "ridicule" },
            { word: "赌气", pinyin: "dǔ qì", cn: "因不满意而行动。", en: "act in pique" },
            { word: "小心翼翼", pinyin: "xiǎo xīn yì yì", cn: "非常小心。", en: "very carefully" },
            { word: "手足无措", pinyin: "shǒu zú wú cuò", cn: "形容慌乱。", en: "at a loss" },
            { word: "冤枉", pinyin: "yuān wang", cn: "受到不公平待遇。", en: "accuse wrongly" },
            { word: "推荐", pinyin: "tuī jiàn", cn: "介绍。", en: "recommend" },
            { word: "捣乱", pinyin: "dǎo luàn", cn: "进行破坏。", en: "disturb" },
            { word: "人缘", pinyin: "rén yuán", cn: "与人的关系。", en: "relations" },
            { word: "口头禅", pinyin: "kǒu tóu chán", cn: "习惯语。", en: "catchphrase" },
            { word: "抵挡", pinyin: "dǐ dǎng", cn: "挡住；阻挡。", en: "resist" },
            { word: "拉扯", pinyin: "lā che", cn: "用力拉住。", en: "pull" }
        ];

        const fillers = "的一是在了我不有个他这到们中上大为国地来以成行时用后".split('');
        let board = [], selectedPath = [], score = 0, timeLeft = 300, timerPtr = null;
        let gameMode = 'hard', perScore = 5, foundWords = [];

        const today = new Date();
        const dateStr = `${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}`;
        document.getElementById('today-date').innerText = "今天是: " + dateStr;
        document.getElementById('game-date').innerText = dateStr;

        function startGame() {
            const name = document.getElementById('player-name').value.trim();
            if(!name) return alert("请输入姓名！");
            gameMode = document.getElementById('level-select').value;
            perScore = (gameMode === 'easy') ? 3 : 5;
            
            document.getElementById('p-name').innerText = name;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            document.getElementById('game-board').className = gameMode === 'easy' ? 'easy-mode' : 'hard-mode';
            
            initBoard();
            timerPtr = setInterval(updateTimer, 1000);
        }

        function initBoard() {
            let chars = [];
            const targets = [...wordBank].sort(() => Math.random() - 0.5).slice(0, 20);
            targets.forEach(v => {
                v.word.split('').forEach((c, idx) => chars.push({ char: c, wordObj: v, charIdx: idx }));
            });
            while(chars.length < 64) {
                chars.push({ char: fillers[Math.floor(Math.random()*fillers.length)], wordObj: null });
            }
            board = chars.sort(() => Math.random() - 0.5);
            render();
        }

        function render() {
            const container = document.getElementById('game-board');
            container.innerHTML = '';
            board.forEach((tile, i) => {
                const div = document.createElement('div');
                div.className = `tile ${tile.wordObj ? 'target' : ''} ${selectedPath.includes(i) ? 'active' : ''}`;
                div.innerText = tile.char;
                div.onclick = () => handleSelect(i);
                container.appendChild(div);
            });
            updateFoundTable();
        }

        function handleSelect(idx) {
            const tile = board[idx];
            if (!tile.wordObj) { selectedPath = []; render(); return; }

            const expectedIdx = selectedPath.length;
            if (tile.charIdx === expectedIdx) {
                if (expectedIdx > 0) {
                    if (tile.wordObj.word !== board[selectedPath[0]].wordObj.word) selectedPath = [idx];
                    else selectedPath.push(idx);
                } else selectedPath.push(idx);
            } else selectedPath = (tile.charIdx === 0) ? [idx] : [];

            render();
            if (selectedPath.length === tile.wordObj.word.length) {
                score += perScore;
                document.getElementById('score').innerText = score;
                foundWords.push(tile.wordObj);
                speak(tile.wordObj.word);
                setTimeout(() => showModal(tile.wordObj), 300);
            }
        }

        function showModal(v) {
            document.getElementById('m-word').innerText = v.word;
            document.getElementById('m-pinyin').innerText = v.pinyin;
            document.getElementById('m-cn').innerText = v.cn;
            document.getElementById('m-en').innerText = v.en;
            document.getElementById('study-modal').style.display = 'flex';
        }

        function closeModal() {
            selectedPath.forEach(idx => board[idx] = { char: fillers[Math.floor(Math.random()*fillers.length)], wordObj: null });
            selectedPath = [];
            document.getElementById('study-modal').style.display = 'none';
            render();
            if (score >= (gameMode === 'easy' ? 60 : 100)) endGame();
        }

        function updateFoundTable() {
            const table = document.getElementById('found-list');
            table.innerHTML = '';
            
            // 第一行空行（按要求保留）
            const emptyRow = document.createElement('tr');
            emptyRow.innerHTML = '<td></td><td></td><td></td>';
            table.appendChild(emptyRow);

            // 前3个词放在第二行，后续每3个换行
            for (let i = 0; i < foundWords.length; i += 3) {
                const tr = document.createElement('tr');
                for (let j = 0; j < 3; j++) {
                    const td = document.createElement('td');
                    if (foundWords[i + j]) {
                        const w = foundWords[i + j];
                        td.innerHTML = `<span class="found-word">${w.word}</span><span class="found-pinyin">${w.pinyin}</span>`;
                    }
                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }
        }

        function updateTimer() {
            if (document.getElementById('study-modal').style.display === 'flex') return;
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
            if (timeLeft <= 0) endGame();
        }

        function endGame() {
            clearInterval(timerPtr);
            document.getElementById('game-container').style.display = 'none';
            const resScreen = document.getElementById('result-screen');
            resScreen.style.display = 'flex';
            document.getElementById('res-date').innerText = dateStr;
            document.getElementById('res-name').innerText = "闯关者: " + document.getElementById('p-name').innerText;
            document.getElementById('res-score').innerText = score + "分";
            const msgBox = document.getElementById('res-msg');
            const pct = score / (gameMode === 'easy' ? 60 : 100);
            if (pct >= 1) msgBox.innerHTML = "🎉 太不可思议了！全对通关！<br>你是当之无愧的华文小状元！🥇✨";
            else if (pct >= 0.8) msgBox.innerHTML = "🌟 优秀！表现出色！加油！👏🔥";
            else if (pct >= 0.5) msgBox.innerHTML = "👍 及格了！继续努力！💪";
            else msgBox.innerHTML = "😅 还没及格哦，再挑战一次吧！🌱📖";
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-CN';
            window.speechSynthesis.speak(msg);
        }
        function speakWord() { speak(document.getElementById('m-word').innerText); }
    </script>
</body>
</html>
