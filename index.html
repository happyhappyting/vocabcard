<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中学华文词语挑战</title>
    <style>
        :root { --primary: #FF9800; --success: #4caf50; --bg: #FFF9C4; --text: #333; --info: #007AFF; }
        body { font-family: 'PingFang SC', "Microsoft YaHei", sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: var(--text); }
        
        /* 登录界面 */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .setup-box { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input, select { padding: 12px; border: 2px solid #eee; border-radius: 12px; width: 100%; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        
        /* 状态栏 */
        .header { background: rgba(255,255,255,0.7); width: 100%; padding: 10px 0; border-bottom: 2px solid #ddd; text-align: center; }
        .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); max-width: 500px; margin: 0 auto; font-weight: bold; font-size: 14px; }

        /* 游戏板 */
        #game-board { display: grid; grid-template-columns: repeat(8, 42px); grid-template-rows: repeat(8, 42px); gap: 6px; background: rgba(255,255,255,0.4); padding: 12px; border-radius: 20px; border: 4px solid white; margin-top: 15px; }
        .tile { width: 42px; height: 42px; background: white; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; transition: 0.2s; box-shadow: 0 3px 0 #ccc; color: black; font-weight: normal; user-select: none; }
        
        /* 难度样式 */
        .easy-mode .tile.target { color: var(--primary); font-weight: bold; }
        .hard-mode .tile { color: black !important; font-weight: normal !important; }

        .tile.active { background: #FFEB3B; transform: scale(1.1); box-shadow: 0 0 10px var(--primary); z-index: 5; }
        .tile.hidden { opacity: 0; pointer-events: none; transform: scale(0); }

        /* 结算界面 */
        #result-screen { position: fixed; inset: 0; background: white; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .result-card { background: var(--bg); padding: 40px; border-radius: 30px; border: 5px solid var(--primary); width: 80%; max-width: 400px; }
        .score-big { font-size: 80px; font-weight: 900; color: var(--primary); margin: 20px 0; }

        /* 弹窗 */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2500; }
        .modal-content { background: white; padding: 30px; border-radius: 25px; text-align: center; width: 280px; border: 5px solid var(--primary); }
        
        button { padding: 12px 30px; border-radius: 15px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; box-shadow: 0 4px 0 #D1457A; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #D1457A; }
        .tts-btn { background: #2196F3; width: 50px; height: 50px; border-radius: 50%; margin-bottom: 10px; font-size: 24px; box-shadow: 0 4px 0 #0056B3; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="setup-box">
            <h1 style="margin:0 0 20px 0">📚 华文闯关</h1>
            <input type="text" id="player-name" placeholder="请输入姓名" maxlength="10">
            <select id="level-select">
                <option value="hard">进阶版 (全黑/5分/满分100)</option>
                <option value="easy">简单版 (加粗/3分/满分60)</option>
            </select>
            <button onclick="startGame()">进入挑战</button>
            <p id="today-date" style="margin-top:20px; color:#666; font-size:14px"></p>
        </div>
    </div>

    <div id="game-container" style="display:none">
        <div class="header">
            <div id="game-date" style="font-size:12px; color:#888; margin-bottom:5px"></div>
            <div class="info-grid">
                <span>👤 <span id="p-name"></span></span>
                <span>⏰ <span id="timer">05:00</span></span>
                <span>🏆 <span id="score">0</span></span>
            </div>
        </div>
        <div id="game-board"></div>
    </div>

    <div id="result-screen">
        <div class="result-card">
            <h2 id="res-date" style="margin:0; color:#666"></h2>
            <h3 id="res-name" style="margin:10px 0; font-size:24px"></h3>
            <div class="score-big" id="res-score">0分</div>
            <div id="res-msg" style="font-size:18px; line-height:1.6; margin-bottom:30px"></div>
            <button onclick="location.reload()">重新挑战</button>
        </div>
    </div>

    <div id="study-modal" class="modal">
        <div class="modal-content" id="m-frame">
            <button class="tts-btn" onclick="speakWord()">🔊</button>
            <div id="bonus-tag" style="display:none; color:var(--info); font-weight:bold; font-size:14px; margin-bottom:5px">✨ 课外知识发现</div>
            <h2 id="m-word" style="font-size: 2.5rem; margin:10px 0"></h2>
            <p id="m-pinyin" style="color:var(--primary); font-size: 1.2rem;"></p>
            <div style="text-align:left; background:#f9f9f9; padding:15px; border-radius:15px; margin:15px 0">
                <div id="m-cn" style="font-weight:bold"></div>
                <div id="m-en" style="color:#888; font-size:0.85rem; margin-top:5px"></div>
            </div>
            <button id="close-btn" onclick="closeModal()">记住了</button>
        </div>
    </div>

<script>
    const wordBank = [
        { word: "淘气", pinyin: "táo qì", cn: "顽皮；爱捣蛋。", en: "naughty" },
        { word: "直率", pinyin: "zhí shuài", cn: "坦率；直爽。", en: "candid" },
        { word: "性格", pinyin: "xìng gé", cn: "心理特征。", en: "nature" },
        { word: "得罪", pinyin: "dé zuì", cn: "触犯；使不愉快。", en: "offend" },
        { word: "别扭", pinyin: "biè niu", cn: "不顺心；拘束。", en: "awkward" },
        { word: "争辩", pinyin: "zhēng biàn", cn: "争论辩驳。", en: "dispute" },
        { word: "瞬间", pinyin: "shùn jiān", cn: "极短的时间。", en: "instant" },
        { word: "兴致勃勃", pinyin: "xìng zhì bó bó", cn: "兴趣非常浓厚。", en: "high spirits" },
        { word: "狼狈", pinyin: "láng bèi", cn: "受窘的样子。", en: "difficult situation" },
        { word: "讥讽", pinyin: "jī fěng", cn: "嘲笑讽刺。", en: "ridicule" },
        { word: "赌气", pinyin: "dǔ qì", cn: "因不满意而行动。", en: "act in pique" },
        { word: "小心翼翼", pinyin: "xiǎo xīn yì yì", cn: "非常小心。", en: "very carefully" },
        { word: "手足无措", pinyin: "shǒu zú wú cuò", cn: "形容慌乱。", en: "at a loss" },
        { word: "冤枉", pinyin: "yuān wang", cn: "受到不公平待遇。", en: "accuse wrongly" },
        { word: "推荐", pinyin: "tuī jiàn", cn: "介绍。", en: "recommend" },
        { word: "捣乱", pinyin: "dǎo luàn", cn: "进行破坏。", en: "disturb" },
        { word: "人缘", pinyin: "rén yuán", cn: "与人的关系。", en: "relations" },
        { word: "口头禅", pinyin: "kǒu tóu chán", cn: "习惯语。", en: "catchphrase" },
        { word: "抵挡", pinyin: "dǐ dǎng", cn: "挡住；阻挡。", en: "resist" },
        { word: "拉扯", pinyin: "lā che", cn: "用力拉住。", en: "pull" }
    ];

    const fillers = "的一是在了我不有个他这到们中上大为国地来以成行时用后".split('');
    let board = [], selectedPath = [], score = 0, timeLeft = 300, timerPtr = null;
    let gameMode = 'hard', perScore = 5, mainDictionary = {}, isBonusWord = false;

    const today = new Date();
    const dateStr = `${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}`;
    document.getElementById('today-date').innerText = "今天是: " + dateStr;
    document.getElementById('game-date').innerText = dateStr;

    // 加载外部大辞典
    fetch('dictionary.json')
        .then(r => r.json())
        .then(data => { mainDictionary = data; })
        .catch(e => console.log("大辞典未加载或不存在"));

    function startGame() {
        const name = document.getElementById('player-name').value.trim();
        if(!name) return alert("请输入姓名！");
        gameMode = document.getElementById('level-select').value;
        perScore = (gameMode === 'easy') ? 3 : 5;
        document.getElementById('p-name').innerText = name;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('game-container').style.display = 'flex';
        document.body.className = gameMode === 'easy' ? 'easy-mode' : 'hard-mode';
        initBoard();
        timerPtr = setInterval(updateTimer, 1000);
    }

    function initBoard() {
        let chars = [];
        const targets = [...wordBank].sort(() => Math.random() - 0.5);
        targets.forEach(v => {
            v.word.split('').forEach((c, idx) => chars.push({ char: c, wordObj: v, charIdx: idx }));
        });
        while(chars.length < 64) {
            chars.push({ char: fillers[Math.floor(Math.random()*fillers.length)], wordObj: null });
        }
        board = chars.sort(() => Math.random() - 0.5);
        render();
    }

    function render() {
        const container = document.getElementById('game-board');
        container.innerHTML = '';
        board.forEach((tile, i) => {
            const div = document.createElement('div');
            div.className = `tile ${tile.char===""?'hidden':''} ${tile.wordObj?'target':''} ${selectedPath.includes(i)?'active':''}`;
            div.innerText = tile.char;
            div.onclick = () => handleSelect(i);
            container.appendChild(div);
        });
    }

function handleSelect(idx) {
        if (selectedPath.includes(idx)) {
            selectedPath = selectedPath.filter(i => i !== idx);
            render(); return;
        }

        selectedPath.push(idx);
        const str = selectedPath.map(i => board[i].char).join('');
        
        // 1. 优先判定单元词库 (必须完全匹配)
        const unitMatch = wordBank.find(v => v.word === str);
        if (unitMatch) {
            isBonusWord = false;
            showModal(unitMatch);
            return;
        }

        // 2. 判定外部大辞典 (单字不跳)
        if (str.length >= 2 && mainDictionary[str]) {
            // 【关键改进】：检查这个词是不是单元词库里某个长词的前半部分
            // 例如：str是"兴致"，而单元词库里有"兴致勃勃"
            const isPrefixOfUnit = wordBank.some(v => v.word.startsWith(str) && v.word !== str);
            
            if (!isPrefixOfUnit) {
                // 如果它不是任何单元词的前缀，才作为百科词弹窗
                isBonusWord = true;
                const dictEntry = mainDictionary[str];
                showModal({
                    word: str,
                    pinyin: dictEntry.pinyin || dictEntry.pronunciation || "",
                    cn: dictEntry.definitions || dictEntry.explanation || "你知道得很多！",
                    en: dictEntry.english || ""
                });
                return;
            }
            // 如果是前缀，我们什么都不做，让玩家继续点下一个字
        }

        // 3. 静默重置逻辑
        if (str.length >= 2) {
            const canBeUnit = wordBank.some(v => v.word.startsWith(str));
            const canBeDict = Object.keys(mainDictionary).some(k => k.startsWith(str));
            if (!canBeUnit && !canBeDict) {
                selectedPath = [];
                setTimeout(render, 150);
                return;
            }
        }
        
        // 如果点到4个字还没触发上面的单元词或大辞典逻辑，重置
        if (str.length >= 4) { 
            // 最后的保险：如果4个字正好是大辞典里的词（比如某个成语），其实在上面str.length >= 2那里就会触发了
            // 这里处理的是4个字完全乱点的情况
            setTimeout(() => {
                selectedPath = [];
                render();
            }, 200);
        }
        
        render();
    }

    function showModal(v) {
        document.getElementById('m-word').innerText = v.word;
        document.getElementById('m-pinyin').innerText = v.pinyin;
        document.getElementById('m-cn').innerText = v.cn;
        document.getElementById('m-en').innerText = v.en;
        
        // 样式区分
        const frame = document.getElementById('m-frame');
        const bonusTag = document.getElementById('bonus-tag');
        frame.style.borderColor = isBonusWord ? "var(--info)" : "var(--primary)";
        bonusTag.style.display = isBonusWord ? "block" : "none";
        
        document.getElementById('study-modal').style.display = 'flex';
        speak(v.word);

        if (!isBonusWord) {
            score += perScore;
            document.getElementById('score').innerText = score;
        }
    }

    function closeModal() {
        if (!isBonusWord) {
            // 只有单元词消除
            selectedPath.forEach(idx => board[idx] = { char: "", wordObj: null });
        }
        selectedPath = [];
        document.getElementById('study-modal').style.display = 'none';
        render();
        if (score >= (gameMode === 'easy' ? 60 : 100)) endGame();
    }

    function updateTimer() {
        if (document.getElementById('study-modal').style.display === 'flex') return;
        timeLeft--;
        let m = Math.floor(timeLeft/60), s = timeLeft%60;
        document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
        if (timeLeft <= 0) endGame();
    }

    function endGame() {
        clearInterval(timerPtr);
        document.getElementById('game-container').style.display = 'none';
        const resScreen = document.getElementById('result-screen');
        resScreen.style.display = 'flex';
        document.getElementById('res-date').innerText = dateStr;
        document.getElementById('res-name').innerText = "闯关者: " + document.getElementById('p-name').innerText;
        document.getElementById('res-score').innerText = score + "分";
        
        const msgBox = document.getElementById('res-msg');
        const max = (gameMode === 'easy' ? 60 : 100);
        const percent = score / max;
        if (percent >= 1) msgBox.innerHTML = "🎉 太不可思议了！全对通关！<br>你是当之无愧的华文小状元！🥇👑✨";
        else if (percent >= 0.8) msgBox.innerHTML = "🌟 优秀！表现非常出色！<br>你的华文功底很扎实哦！加油！👏🔥";
        else if (percent >= 0.5) msgBox.innerHTML = "👍 及格了！继续努力！<br>多记多练，下次一定会更好！📚💪";
        else msgBox.innerHTML = "😅 还没及格哦，不要气馁！<br>失败是成功之母，再挑战一次吧！🌱📖";
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-CN';
        window.speechSynthesis.speak(msg);
    }
    function speakWord() { speak(document.getElementById('m-word').innerText); }
</script>
</body>
</html>
