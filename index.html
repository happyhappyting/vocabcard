<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>华文词语消消乐</title>
    <style>
        :root { --primary: #FF9800; --success: #4caf50; --bg-yellow: #FFF9C4; --glass: rgba(255, 255, 255, 0.85); --text-brown: #5D4037; }
        body { font-family: 'PingFang SC', sans-serif; background-color: var(--bg-yellow); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; position: relative; }
        #emoji-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .floating-emoji { position: absolute; font-size: 2rem; opacity: 0.3; animation: float linear infinite; }
        @keyframes float { from { transform: translateY(110vh); } to { transform: translateY(-10vh); } }
        
        .setup-bar { background: var(--glass); backdrop-filter: blur(12px); padding: 15px 20px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); margin: 15px; display: flex; gap: 10px; z-index: 10; border: 1px solid white; }
        #timer { font-size: 1.2rem; font-weight: bold; color: #E64A19; height: 1.5rem; margin-bottom: 5px; }
        
        #game-board { display: grid; grid-template-columns: repeat(6, 55px); grid-template-rows: repeat(6, 55px); gap: 8px; background: rgba(255, 255, 255, 0.3); padding: 12px; border-radius: 18px; border: 2px solid white; display: none; }
        .tile { width: 55px; height: 55px; background: white; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; color: var(--text-brown); cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 0 #ddd; position: relative; }
        .tile.filler { background: #fdfdfd; color: #bbb; box-shadow: 0 4px 0 #eee; cursor: default; } /* 干扰字样式 */
        .tile.empty { visibility: hidden; }
        .tile.matched { background: var(--success) !important; color: white; animation: celebrate 0.5s ease; z-index: 5; }
        @keyframes celebrate { 50% { transform: scale(1.1); } }
        
        select, button { padding: 10px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .btn-main { background: var(--primary); color: white; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 200; }
        .modal-content { background: white; padding: 25px; border-radius: 24px; text-align: center; width: 280px; }
        .meaning-box { text-align: left; background: #F5F5F5; padding: 15px; border-radius: 15px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="emoji-bg"></div>
    <h1>✨ 华文大闯关</h1>
    
    <div class="setup-bar">
        <select id="unit-select">
            <option value="unit1">单元一</option>
            <option value="unit2">单元二</option>
            <option value="unit3">单元三</option>
            <option value="unit4">单元四</option>
        </select>
        <select id="diff-select">
            <option value="5">初级 (5词)</option>
            <option value="8">中级 (120s)</option>
            <option value="11">高级 (180s)</option>
        </select>
        <button class="btn-main" onclick="loadUnitScript()">确认开始</button>
    </div>

    <div id="timer"></div>
    <div id="game-board"></div>

    <div id="study-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-word" style="color:var(--primary); margin:0"></h2>
            <div id="modal-pinyin" style="color:#888; margin:5px 0 15px"></div>
            <div id="modal-meaning" class="meaning-box"></div>
            <button class="btn-main" style="margin-top:20px; width:100%" onclick="closeModal()">记住了</button>
        </div>
    </div>

    <script>
        // 干扰字库：初一学生熟悉的词汇，用于填满空格
        const fillers = ["苹果", "学习", "食堂", "课室", "爷", "快乐", "作业", "运动", "老师", "早操", "文具", "零食", "校车"];
        let fillerChars = fillers.join('').split('');

        let board = [], targetWords = [], timerPtr = null;
        let timeLeft = 0, isPaused = false;

        // 装饰 Emoji
        const bg = document.getElementById('emoji-bg');
        for(let i=0; i<15; i++) {
            let el = document.createElement('div');
            el.className = 'floating-emoji'; el.innerText = ['📚','✍️','🍎','💡','🎓'][i%5];
            el.style.left = Math.random()*100+'vw'; el.style.animationDuration = (8+Math.random()*12)+'s';
            bg.appendChild(el);
        }

        function loadUnitScript() {
            const unit = document.getElementById('unit-select').value;
            const scriptId = 'dynamic-script';
            if(document.getElementById(scriptId)) document.getElementById(scriptId).remove();
            
            window.unitData = null; 
            const script = document.createElement('script');
            script.id = scriptId;
            script.src = `${unit}.js?t=${Date.now()}`;
            script.onload = () => {
                if(window.unitData) startGame(window.unitData);
                else alert("文件内未发现 unitData");
            };
            script.onerror = () => alert("请确保 " + unit + ".js 存在");
            document.head.appendChild(script);
        }

        function startGame(data) {
            const diff = parseInt(document.getElementById('diff-select').value);
            // 过滤单字：只选取长度 > 1 的词语作为目标
            const multiCharWords = data.filter(item => item.word.length > 1);
            targetWords = [...multiCharWords].sort(() => Math.random() - 0.5).slice(0, diff);
            
            clearInterval(timerPtr);
            timeLeft = (diff === 8) ? 120 : (diff === 11 ? 180 : 0);
            
            let chars = [];
            // 放入目标词语
            targetWords.forEach(v => v.word.split('').forEach(c => chars.push({char:c, wordObj:v, isTarget:true})));
            
            // 填满剩余的 36 个格子 (6x6)
            while(chars.length < 35) { // 留 1 个空格给移动逻辑
                const randomFiller = fillerChars[Math.floor(Math.random() * fillerChars.length)];
                chars.push({char: randomFiller, isTarget: false});
            }
            chars.push({char: "", isTarget: false, empty: true}); // 唯一的空格

            board = chars.sort(() => Math.random() - 0.5);
            document.querySelector('.setup-bar').style.display = 'none';
            document.getElementById('game-board').style.display = 'grid';
            render();
            startTimer();
        }

        function startTimer() {
            if(timeLeft <= 0) { document.getElementById('timer').innerText = "💡 模式：轻松练习"; return; }
            timerPtr = setInterval(() => {
                if(!isPaused) {
                    timeLeft--;
                    document.getElementById('timer').innerText = `⏰ 倒计时: ${timeLeft}s`;
                    if(timeLeft <= 0) { clearInterval(timerPtr); alert("时间到！"); location.reload(); }
                }
            }, 1000);
        }

        function render() {
            const container = document.getElementById('game-board');
            container.innerHTML = '';
            board.forEach((tile, i) => {
                const div = document.createElement('div');
                div.className = `tile ${tile.empty ? 'empty' : ''} ${!tile.isTarget && !tile.empty ? 'filler' : ''}`;
                div.innerText = tile.char;
                div.onclick = () => moveTile(i);
                container.appendChild(div);
            });
            checkMatches();
        }

        function moveTile(idx) {
            if (board[idx].empty || isPaused) return;
            const emptyIdx = board.findIndex(b => b.empty);
            const r1 = Math.floor(idx/6), c1 = idx%6, r2 = Math.floor(emptyIdx/6), c2 = emptyIdx%6;
            if (Math.abs(r1-r2) + Math.abs(c1-c2) === 1) {
                [board[idx], board[emptyIdx]] = [board[emptyIdx], board[idx]];
                render();
            }
        }

        function checkMatches() {
            for (let r = 0; r < 6; r++) {
                let rowStr = "";
                for (let c = 0; c < 6; c++) rowStr += (board[r*6+c].isTarget ? board[r*6+c].char : " ");
                targetWords.forEach((v, vIdx) => {
                    const s = rowStr.indexOf(v.word);
                    if (s !== -1) {
                        isPaused = true;
                        const tiles = document.querySelectorAll('.tile');
                        for(let i=0; i<v.word.length; i++) tiles[r*6+s+i].classList.add('matched');
                        
                        setTimeout(() => {
                            document.getElementById('modal-word').innerText = v.word;
                            document.getElementById('modal-pinyin').innerText = v.pinyin;
                            document.getElementById('modal-meaning').innerHTML = `<div>${v.meaning}</div><div style="color:#999;font-size:0.8em;margin-top:8px">${v.meaning_en}</div>`;
                            document.getElementById('study-modal').style.display = 'flex';
                            for(let i=0; i<v.word.length; i++) board[r*6+s+i] = {char: fillerChars[Math.floor(Math.random()*fillerChars.length)], isTarget:false};
                        }, 500);
                        targetWords.splice(vIdx, 1);
                    }
                });
            }
        }

        function closeModal() {
            document.getElementById('study-modal').style.display = 'none';
            isPaused = false;
            render();
            if(targetWords.length === 0) { clearInterval(timerPtr); setTimeout(() => alert("本单元词语已找齐！"), 300); }
        }
    </script>
</body>
</html>
