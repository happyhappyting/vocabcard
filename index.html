<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>华文词语华容道</title>
    <style>
        :root { --primary: #4a90e2; --success: #4caf50; --empty: #e0e0e0; }
        body { font-family: system-ui; background: #fdf6e3; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        p { color: #666; font-size: 0.9rem; }
        
        #game-board {
            display: grid;
            grid-template-columns: repeat(5, 65px); /* 5列 */
            grid-template-rows: repeat(5, 65px);    /* 5行 */
            gap: 8px;
            background: #d3c6aa;
            padding: 10px;
            border-radius: 10px;
            touch-action: manipulation; /* 优化移动端点击 */
        }

        .tile {
            width: 65px; height: 65px; background: white;
            border-radius: 6px; display: flex; justify-content: center;
            align-items: center; font-size: 24px; font-weight: bold;
            cursor: pointer; position: relative; transition: all 0.2s;
            box-shadow: 0 3px 0 #bbb;
        }

        .tile.empty { background: var(--empty); box-shadow: none; cursor: default; }
        .tile.matched { background: var(--success); color: white; border-color: #2e7d32; }

        /* 拼音小气泡 */
        .popover {
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 2px 6px; border-radius: 4px;
            font-size: 11px; white-space: nowrap; pointer-events: none; display: none;
        }
        .tile:active .popover { display: block; }

        .controls { margin-top: 20px; }
        button { padding: 12px 24px; font-size: 16px; border: none; border-radius: 25px; background: var(--primary); color: white; cursor: pointer; }
    </style>
</head>
<body>

    <h1>🧩 词语华容道</h1>
    <p>点击空格旁边的字进行移动<br>长按/点击查看拼音</p>

    <div id="game-board"></div>

    <div class="controls">
        <button onclick="initGame()">重新洗牌</button>
    </div>

<script>
    const vocabulary = [
        { word: "淘气", pinyin: "táo qì" }, { word: "科技", pinyin: "kē jì" },
        { word: "人缘", pinyin: "rén yuán" }, { word: "直率", pinyin: "zhí shuài" },
        { word: "瞬间", pinyin: "shùn jiān" }, { word: "粘", pinyin: "zhān" },
        { word: "嚷", pinyin: "rǎng" }, { word: "律师", pinyin: "lǜ shī" }
    ];

    const size = 5; 
    let board = [];

    function initGame() {
        // 准备 24 个汉字 + 1 个空格
        let chars = [];
        vocabulary.forEach(v => {
            v.word.split('').forEach(c => chars.push({ char: c, py: v.pinyin }));
        });

        // 如果字不够，补齐到24个
        while(chars.length < 24) chars.push({ char: "学", py: "xué" });
        chars = chars.slice(0, 24);
        
        // 变成对象数组
        board = chars.map(item => ({ ...item, empty: false }));
        board.push({ char: "", py: "", empty: true });

        // 随机打乱
        board.sort(() => Math.random() - 0.5);
        render();
    }

    function render() {
        const container = document.getElementById('game-board');
        container.innerHTML = '';

        board.forEach((tile, index) => {
            const div = document.createElement('div');
            div.className = `tile ${tile.empty ? 'empty' : ''}`;
            div.innerHTML = tile.empty ? '' : `<div class="popover">${tile.py}</div>${tile.char}`;
            
            // 核心移动逻辑
            div.onclick = () => {
                const emptyIndex = board.findIndex(b => b.empty);
                if (isAdjacent(index, emptyIndex)) {
                    // 交换数据
                    const temp = board[index];
                    board[index] = board[emptyIndex];
                    board[emptyIndex] = temp;
                    render(); // 重新渲染
                }
            };
            container.appendChild(div);
        });
        checkWin();
    }

    function isAdjacent(idx1, idx2) {
        const r1 = Math.floor(idx1 / size), c1 = idx1 % size;
        const r2 = Math.floor(idx2 / size), c2 = idx2 % size;
        return Math.abs(r1 - r2) + Math.abs(c1 - c2) === 1;
    }

    function checkWin() {
        // 简单的横向词语检测
        const tiles = document.querySelectorAll('.tile');
        const currentChars = board.map(b => b.char).join('');
        
        vocabulary.forEach(v => {
            if (currentChars.includes(v.word)) {
                // 如果在序列中找到了词语，可以给对应的 tile 加个颜色（演示性质）
                console.log("拼出了词语: " + v.word);
            }
        });
    }

    initGame();
</script>
</body>
</html>
