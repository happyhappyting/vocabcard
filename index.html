<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中学华文词语挑战</title>
    <style>
        :root { 
            --primary: #FF9800; 
            --success: #4caf50; 
            --bg-base: radial-gradient(circle, #E8F5E9 0%, #C7EDCC 100%); /* 升级渐变背景 */
            --text: #333; 
            --danger: #f44336;
            --info: #007AFF;
            --glass: rgba(255, 255, 255, 0.7);
        }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg-base); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; overflow-x: hidden; }

        /* 🌸 背景飘落 Emoji 升级阴影 🌸 */
        .emoji-bg { position: fixed; inset: 0; pointer-events: none; z-index: -1; }
        .falling-emoji { position: absolute; opacity: 0.6; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1)); animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-50px) rotate(0deg); } 100% { transform: translateY(105vh) rotate(360deg); } }

        /* 标题艺术化处理 */
        h1 { 
            font-size: 2.5rem;
            background: linear-gradient(to bottom, #FF9800, #F44336);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 2px 0px white) drop-shadow(4px 4px 10px rgba(0,0,0,0.2));
            margin-bottom: 20px;
        }

        /* 登录与游戏板布局 */
        #login-screen { position: fixed; inset: 0; background: var(--bg-base); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .setup-box { background: white; padding: 40px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); text-align: center; width: 300px; border: 1px solid rgba(255,255,255,0.8); }
        input, select { padding: 14px; border: 2px solid #f0f0f0; border-radius: 16px; width: 100%; margin-bottom: 18px; outline: none; transition: 0.3s; font-size: 16px; box-sizing: border-box; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(255,152,0,0.2); }

        #game-container { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 500px; }
        
        /* 状态栏水晶化 */
        .game-header { 
            width: 100%; display: grid; grid-template-columns: 1.5fr 1fr 1fr 0.5fr; gap: 8px; 
            align-items: center; background: var(--glass); backdrop-filter: blur(10px); 
            padding: 12px; border-radius: 20px; margin-bottom: 20px; font-weight: bold; 
            border: 1px solid white; box-sizing: border-box; box-shadow: 0 8px 32px rgba(0,0,0,0.05);
        }
        .game-header > div { background: rgba(255,255,255,0.5); padding: 5px 8px; border-radius: 10px; text-align: center; }

        /* 游戏板与字块实体化 */
        #game-board { 
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; 
            background: rgba(255,255,255,0.3); padding: 12px; border-radius: 24px; 
            border: 6px solid white; width: 100%; aspect-ratio: 1/1; box-sizing: border-box; 
            position: relative; box-shadow: 0 15px 45px rgba(0,0,0,0.1);
        }
        /* 高难度流光效果 */
        .extreme-mode { border-image: linear-gradient(45deg, #FFD700, #FFA500, #B8860B) 1; animation: borderGlow 3s infinite alternate; }
        @keyframes borderGlow { from { box-shadow: 0 0 5px #FFD700; } to { box-shadow: 0 0 25px #FFD700; } }

        .tile { 
            background: linear-gradient(145deg, #ffffff, #f0f0f0); border-radius: 10px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: clamp(14px, 5vw, 22px); cursor: pointer; transition: transform 0.1s, box-shadow 0.2s, background 0.2s; 
            box-shadow: 0 4px 0 #d0d0d0, 0 6px 10px rgba(0,0,0,0.1); user-select: none; 
        }
        .tile:active { transform: translateY(2px); box-shadow: 0 2px 0 #d0d0d0; }
        
        .easy-mode .tile.target { color: var(--primary); font-weight: bold; text-shadow: 0 0 1px rgba(255,152,0,0.3); }
        .hard-mode .tile, .extreme-mode .tile { color: #222 !important; font-weight: 500 !important; }
        .tile.empty { visibility: hidden; pointer-events: none; opacity: 0; transform: scale(0.5); transition: 0.3s; }

        .tile.active { background: #FFEB3B; transform: scale(1.08) translateY(-2px); box-shadow: 0 6px 15px rgba(255,152,0,0.4); z-index: 5; border: 2px solid var(--primary); }
        .tile.wrong { background: var(--danger) !important; color: white !important; animation: shake 0.4s; box-shadow: 0 0 20px rgba(244,67,54,0.5); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 60% { transform: translateX(6px); } }

        .found-section { width: 100%; margin-top: 30px; background: rgba(255,255,255,0.4); padding: 15px; border-radius: 20px; }
        .found-table td { background: white; border-radius: 12px; padding: 10px 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: 0.3s; }
        .found-word { font-size: 16px; letter-spacing: 1px; }

        /* 模态框入场动画 */
        .modal { backdrop-filter: blur(8px); transition: 0.3s; }
        .modal-content { 
            background: white; padding: 30px; border-radius: 35px; text-align: center; 
            width: 300px; border: 8px solid var(--primary); box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        button { padding: 14px 30px; border-radius: 18px; border: none; background: var(--primary); color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 6px 0 #E68A00; }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #E68A00; }
        button:active { transform: translateY(4px); box-shadow: 0 2px 0 #E68A00; }

        .result-score { 
            font-size: 72px; background: linear-gradient(to bottom, #FF9800, #F44336);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 10px rgba(255,152,0,0.3));
        }
    </style>
</head>
<body>

    <div class="emoji-bg" id="emoji-container"></div>

    <div id="login-screen">
        <div class="setup-box">
            <h1>📚 华文闯关</h1>
            <p id="today-date" style="color:#888; font-size:14px; margin-bottom: 20px; font-weight: bold;"></p>
            <input type="text" id="player-name" placeholder="请输入你的姓名">
            <select id="level-select">
                <option value="extreme">🔥 高难度版 (不消除/100满)</option>
                <option value="hard">🌿 进阶版 (全黑/80满)</option>
                <option value="easy">🌱 简单版 (提示/60满)</option>
            </select>
            <button onclick="startGame()">进入挑战</button>
        </div>
    </div>

    <div id="result-screen" class="modal">
        <div class="result-box">
            <span class="celebrate-emoji" id="res-emoji">🎉</span>
            <div class="result-title" style="font-weight: 900; letter-spacing: 2px;">挑战报告</div>
            <div class="result-info" id="res-date"></div>
            <div class="result-info" id="res-name"></div>
            <div class="result-score" id="res-score">0</div>
            <div class="result-comment" id="res-comment"></div>
            <button onclick="location.reload()">再挑战一次</button>
        </div>
    </div>

    <div id="game-container">
        <div class="game-header">
            <div style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">👤 <span id="p-name"></span></div>
            <div>⏰ <span id="timer" style="color:var(--danger)">05:00</span></div>
            <div>🏆 <span id="score" style="color:var(--primary)">0</span>分</div>
            <div class="mute-toggle" id="mute-btn" onclick="toggleMute()" style="background: none;">🔊</div>
        </div>
        <div id="game-board"></div>
        <div class="found-section">
            <div style="font-weight:bold; margin-bottom: 10px; color: #555; display: flex; align-items: center;">
                <span style="background: var(--primary); width: 4px; height: 16px; display: inline-block; margin-right: 8px; border-radius: 2px;"></span>
                我找到了！
            </div>
            <table class="found-table" id="found-list"></table>
        </div>
    </div>

    <div id="study-modal" class="modal">
        <div class="modal-content" id="m-frame">
            <button class="tts-btn" onclick="speakWord()">🔊</button>
            <div id="bonus-tag" style="display:none; color:var(--info); font-weight:bold; font-size:14px; margin-bottom:5px">✨ 课外知识发现</div>
            <h2 id="m-word" style="font-size: 2.8rem; margin:10px 0; letter-spacing: 4px;"></h2>
            <p id="m-pinyin" style="color:var(--primary); font-size: 1.3rem; font-weight: bold;"></p>
            <div style="text-align:left; background:#f0f7f0; padding:20px; border-radius:20px; margin:20px 0; border: 1px dashed var(--success);">
                <div id="m-cn" style="font-weight:bold; font-size:16px; line-height: 1.5; color: #444;"></div>
                <div id="m-en" style="color:#999; font-size:13px; margin-top:8px; border-top: 1px solid #eee; padding-top: 8px;"></div>
            </div>
            <button id="modal-close-btn" style="width: 100%;">记住了</button>
        </div>
    </div>

    <script>
        // --- 逻辑完全保留 ---
        const wordBank = [
            { word: "淘气", pinyin: "táo qì", cn: "顽皮；爱捣蛋。", en: "naughty" },
            { word: "直率", pinyin: "zhí shuài", cn: "坦率；直爽。", en: "candid" },
            { word: "性格", pinyin: "xìng gé", cn: "心理特征。", en: "nature" },
            { word: "得罪", pinyin: "dé zuì", cn: "触犯；使不愉快。", en: "offend" },
            { word: "别扭", pinyin: "biè niu", cn: "不顺心；拘束。", en: "awkward" },
            { word: "争辩", pinyin: "zhēng biàn", cn: "争论辩驳。", en: "dispute" },
            { word: "瞬间", pinyin: "shùn jān", cn: "极短的时间。", en: "instant" },
            { word: "兴致勃勃", pinyin: "xìng zhì bó bó", cn: "兴趣非常浓厚。", en: "high spirits" },
            { word: "狼狈", pinyin: "láng bèi", cn: "受窘的样子。", en: "difficult situation" },
            { word: "讥讽", pinyin: "jī fěng", cn: "嘲笑讽刺。", en: "ridicule" },
            { word: "赌气", pinyin: "dǔ qì", cn: "因不满意而行动。", en: "act in pique" },
            { word: "小心翼翼", pinyin: "xiǎo xīn yì yì", cn: "非常小心。", en: "very carefully" },
            { word: "手足无措", pinyin: "shǒu zú wú cuò", cn: "形容慌乱。", en: "at a loss" },
            { word: "冤枉", pinyin: "yuān wang", cn: "受到不公平待遇。", en: "accuse wrongly" },
            { word: "推荐", pinyin: "tuī jiàn", cn: "介绍。", en: "recommend" },
            { word: "捣乱", pinyin: "dǎo luàn", cn: "进行破坏。", en: "disturb" },
            { word: "人缘", pinyin: "rén yuán", cn: "与人的关系。", en: "relations" },
            { word: "口头禅", pinyin: "kǒu tóu chán", cn: "习惯语。", en: "catchphrase" },
            { word: "抵挡", pinyin: "dǐ dǎng", cn: "挡住；阻挡。", en: "resist" },
            { word: "拉扯", pinyin: "lā che", cn: "用力拉住。", en: "pull" }
        ];

        const fillers = "的一是在了我不有个他这到们中上大为国地来以成行时用后".split('');
        let board = [], selectedPath = [], score = 0, timeLeft = 300, timerPtr = null;
        let gameMode = 'extreme', perScore = 5, foundWords = [];
        let mainDictionary = {}; 
        let isMuted = false;
        let isProcessing = false; 
        let isBonusWord = false; 

        fetch('dictionary.json')
            .then(r => r.json())
            .then(data => { mainDictionary = data; })
            .catch(e => console.log("大辞典未加载"));

        (function initVisuals() {
            const container = document.getElementById('emoji-container');
            for (let i = 0; i < 15; i++) {
                const el = document.createElement('div');
                el.className = 'falling-emoji';
                el.innerText = ['📚', '✍️', '✨', '🏮'][Math.floor(Math.random()*4)];
                el.style.left = Math.random() * 100 + 'vw';
                el.style.animationDuration = (8 + Math.random()*7) + 's';
                el.style.animationDelay = (Math.random()*-10) + 's';
                el.style.fontSize = (20 + Math.random()*20) + 'px';
                container.appendChild(el);
            }
            document.getElementById('today-date').innerText = "📅 " + new Date().toLocaleDateString();
        })();

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('mute-btn').innerText = isMuted ? "🔇" : "🔊";
            if (isMuted) window.speechSynthesis.cancel();
        }

        function startGame() {
            const name = document.getElementById('player-name').value.trim();
            if(!name) return alert("请输入姓名");
            gameMode = document.getElementById('level-select').value;
            perScore = (gameMode === 'easy') ? 3 : 5;
            document.getElementById('p-name').innerText = name;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            
            let boardClass = 'extreme-mode';
            if(gameMode === 'easy') boardClass = 'easy-mode';
            if(gameMode === 'hard') boardClass = 'hard-mode';
            document.getElementById('game-board').className = boardClass;

            initBoard();
            timerPtr = setInterval(updateTimer, 1000);
        }

        function initBoard() {
            let chars = [];
            const targets = [...wordBank].sort(() => 0.5 - Math.random()).slice(0, 20);
            targets.forEach(v => {
                v.word.split('').forEach((c, idx) => chars.push({ char: c, wordObj: v, charIdx: idx, empty: false }));
            });
            while(chars.length < 64) chars.push({ char: fillers[Math.floor(Math.random()*fillers.length)], wordObj: null, empty: false });
            board = chars.sort(() => 0.5 - Math.random());
            render();
        }

        function render() {
            const container = document.getElementById('game-board');
            container.innerHTML = '';
            board.forEach((tile, i) => {
                const div = document.createElement('div');
                div.className = `tile ${tile.wordObj ? 'target' : ''} ${selectedPath.includes(i) ? 'active' : ''} ${tile.empty ? 'empty' : ''}`;
                div.innerText = tile.empty ? '' : tile.char;
                div.onclick = () => handleSelect(i);
                container.appendChild(div);
            });
            updateFoundTable();
        }

        function handleSelect(idx) {
            if (isProcessing || selectedPath.includes(idx) || board[idx].empty) return; 
            selectedPath.push(idx);
            render();
            checkWord();
        }

        function checkWord() {
            const str = selectedPath.map(i => board[i].char).join('');
            const unitMatch = wordBank.find(v => v.word === str);
            if (unitMatch) {
                isProcessing = true;
                isBonusWord = false;
                showModal(unitMatch);
                return;
            }
            if (str.length >= 2 && mainDictionary[str]) {
                const isPrefixOfUnit = wordBank.some(v => v.word.startsWith(str) && v.word !== str);
                if (!isPrefixOfUnit) {
                    isProcessing = true;
                    isBonusWord = true;
                    const dictEntry = mainDictionary[str];
                    showModal({
                        word: str,
                        pinyin: dictEntry.pinyin || dictEntry.pronunciation || "",
                        cn: dictEntry.definitions || dictEntry.explanation || "你知道得很多！",
                        en: dictEntry.english || ""
                    });
                    return;
                }
            }
            if (str.length >= 2) {
                const canBeUnit = wordBank.some(v => v.word.startsWith(str));
                const canBeDict = Object.keys(mainDictionary).some(k => k.startsWith(str));
                if (!canBeUnit && !canBeDict) triggerWrongEffect();
            }
            if (str.length >= 4) triggerWrongEffect();
        }

        function triggerWrongEffect() {
            isProcessing = true;
            const tiles = document.querySelectorAll('.tile.active');
            tiles.forEach(t => t.classList.add('wrong'));
            setTimeout(() => {
                selectedPath = [];
                isProcessing = false;
                render();
            }, 400);
        }

        function showModal(v) {
            document.getElementById('m-word').innerText = v.word;
            document.getElementById('m-pinyin').innerText = v.pinyin;
            document.getElementById('m-cn').innerText = v.cn;
            document.getElementById('m-en').innerText = v.en;
            
            const frame = document.getElementById('m-frame');
            const bonusTag = document.getElementById('bonus-tag');
            frame.style.borderColor = isBonusWord ? "var(--info)" : "var(--primary)";
            bonusTag.style.display = isBonusWord ? "block" : "none";
            
            if (!isBonusWord) {
                score += perScore;
                document.getElementById('score').innerText = score;
                foundWords.unshift(v);
            }

            const modal = document.getElementById('study-modal');
            const btn = document.getElementById('modal-close-btn');

            btn.onclick = () => {
                if(!isBonusWord) {
                    selectedPath.forEach(idx => {
                        if(gameMode === 'extreme') {
                            board[idx] = { char: fillers[Math.floor(Math.random()*fillers.length)], wordObj: null, empty: false };
                        } else {
                            board[idx].empty = true;
                        }
                    });
                }
                selectedPath = [];
                isProcessing = false;
                modal.style.display = 'none';
                render();
                const targetEnd = gameMode === 'easy' ? 60 : (gameMode === 'hard' ? 80 : 100);
                if (score >= targetEnd) endGame();
            };
            
            modal.style.display = 'flex';
            speak(v.word);
        }

        function updateFoundTable() {
            const table = document.getElementById('found-list');
            table.innerHTML = '';
            for (let i = 0; i < foundWords.length; i += 3) {
                const tr = document.createElement('tr');
                for (let j = 0; j < 3; j++) {
                    const td = document.createElement('td');
                    if (foundWords[i + j]) {
                        const w = foundWords[i + j];
                        td.innerHTML = `<span class="found-word">${w.word}</span><span class="found-pinyin">${w.pinyin}</span>`;
                    }
                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }
        }

        function updateTimer() {
            if (document.getElementById('study-modal').style.display === 'flex' || document.getElementById('result-screen').style.display === 'flex') return;
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
            if (timeLeft <= 0) endGame();
        }

        function endGame() {
            clearInterval(timerPtr);
            const maxScore = gameMode === 'easy' ? 60 : (gameMode === 'hard' ? 80 : 100);
            const ratio = score / maxScore;
            
            let emoji = "💪";
            let comment = "";
            let fireworks = false;

            if (ratio < 0.5) {
                emoji = "🌱";
                comment = "加油加油！再多练习一下，你一定可以更棒的！";
            } else if (ratio < 0.75) {
                emoji = "🌟";
                comment = "很不错的表现！词汇量正在稳步提升哦，继续保持！";
            } else if (ratio < 1) {
                emoji = "🏆";
                comment = "太厉害了！你几乎掌握了所有的词语，真是华文小达人！";
            } else {
                emoji = "👑";
                comment = "独孤求败！你已经达到了最高境界，大满贯诞生！";
                fireworks = true;
            }

            document.getElementById('res-emoji').innerText = emoji;
            document.getElementById('res-date').innerText = "日期：" + new Date().toLocaleDateString();
            document.getElementById('res-name').innerText = "挑战者：" + document.getElementById('player-name').value;
            document.getElementById('res-score').innerText = score + "分";
            document.getElementById('res-comment').innerText = comment;
            document.getElementById('result-screen').style.display = 'flex';

            if (fireworks) {
                const container = document.getElementById('emoji-container');
                const fx = ['🎆', '✨', '🎉', '🔥'];
                for (let i = 0; i < 60; i++) {
                    setTimeout(() => {
                        const el = document.createElement('div');
                        el.className = 'falling-emoji';
                        el.style.opacity = "0.8";
                        el.style.zIndex = "3000";
                        el.innerText = fx[Math.floor(Math.random()*fx.length)];
                        el.style.left = Math.random() * 100 + 'vw';
                        el.style.fontSize = (20 + Math.random()*30) + 'px';
                        el.style.animationDuration = (2 + Math.random()*2) + 's';
                        container.appendChild(el);
                    }, i * 100);
                }
            }
        }

        function speak(text) {
            if (isMuted) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-CN';
            window.speechSynthesis.speak(msg);
        }
        function speakWord() { speak(document.getElementById('m-word').innerText); }
    </script>
</body>
</html>
