<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中学华文词语消消乐</title>
    <style>
        :root { --primary: #FF9800; --success: #4caf50; --bg: #FFF9C4; --text: #5D4037; }
        body { font-family: 'PingFang SC', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: var(--text); }
        
        /* 登录界面 */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .input-group { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 12px; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 15px; width: 200px; font-size: 16px; }

        /* 顶部信息栏 */
        .status-bar { display: flex; gap: 20px; padding: 15px; font-weight: bold; font-size: 14px; background: rgba(255,255,255,0.5); width: 100%; justify-content: center; }
        
        /* 游戏主体 */
        #game-container { display: none; flex-direction: column; align-items: center; width: 100%; }
        #game-board { display: grid; grid-template-columns: repeat(8, 45px); grid-template-rows: repeat(8, 45px); gap: 5px; background: rgba(255,255,255,0.3); padding: 10px; border-radius: 15px; border: 3px solid white; margin-top: 10px; }
        
        .tile { width: 45px; height: 45px; background: white; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; transition: transform 0.1s; box-shadow: 0 3px 0 #ddd; user-select: none; }
        .tile.selected { transform: scale(0.9); border: 2px solid var(--primary); background: #FFF3E0; }
        .tile.matched { background: var(--success) !important; color: white; transform: scale(1.1); font-weight: bold; }
        .tile.filler { color: #bbb; font-weight: normal; }

        /* 弹窗样式 */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 500; }
        .modal-content { background: white; padding: 25px; border-radius: 24px; text-align: center; width: 280px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .meaning-box { text-align: left; background: #f9f9f9; padding: 15px; border-radius: 15px; margin-top: 10px; border-left: 5px solid var(--primary); }
        
        button { padding: 12px 25px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="input-group">
            <h2>🎒 欢迎闯关</h2>
            <input type="text" id="player-name" placeholder="请输入你的姓名" maxlength="10">
            <br>
            <button onclick="startGame()">进入游戏</button>
            <p id="hiscore-msg" style="font-size: 12px; color: #888; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="game-container">
        <div class="status-bar">
            <span>👤: <span id="display-name"></span></span>
            <span>⏰: <span id="timer">05:00</span></span>
            <span>🏆: <span id="score">0</span>/100</span>
        </div>
        
        <div id="game-board"></div>
        <p style="font-size: 12px; color: #888; margin-top: 10px;">💡 提示：点击两个相邻字交换，拼成词语即可消除！</p>
    </div>

    <div id="study-modal" class="modal">
        <div class="modal-content">
            <h2 id="m-word" style="color:var(--primary); margin:0; font-size: 2.5rem;"></h2>
            <p id="m-pinyin" style="color:#666; font-size: 1.2rem; margin: 5px 0;"></p>
            <div class="meaning-box">
                <div id="m-cn" style="font-weight:bold;"></div>
                <div id="m-en" style="color:#888; font-size: 0.9em; margin-top:8px; font-style:italic;"></div>
            </div>
            <button style="margin-top:20px; width:100%" onclick="closeModal()">我学会了 (+5分)</button>
        </div>
    </div>

    <script>
        // --- 1. 词库（你可以继续往里加，系统会自动选20个） ---
        const wordBank = [
            { word: "淘气", pinyin: "táo qì", cn: "顽皮；爱捣蛋。", en: "naughty; mischievous" },
            { word: "直率", pinyin: "zhí shuài", cn: "坦率；直爽。", en: "candid; frank" },
            { word: "性格", pinyin: "xìng gé", cn: "心理特征。", en: "nature; character" },
            { word: "得罪", pinyin: "dé zuì", cn: "触犯；使不愉快。", en: "to commit an offense" },
            { word: "别扭", pinyin: "biè niu", cn: "不顺心；拘束。", en: "awkward" },
            { word: "争辩", pinyin: "zhēng biàn", cn: "争论辩驳。", en: "a dispute" },
            { word: "瞬间", pinyin: "shùn jiān", cn: "极短的时间。", en: "in an instant" },
            { word: "兴致勃勃", pinyin: "xìng zhì bó bó", cn: "兴趣非常浓厚。", en: "in high spirits" },
            { word: "狼狈", pinyin: "láng bèi", cn: "受窘的样子。", en: "in a difficult situation" },
            { word: "讥讽", pinyin: "jī fěng", cn: "嘲笑讽刺。", en: "to ridicule" },
            { word: "赌气", pinyin: "dǔ qì", cn: "因不满意而行动。", en: "act in pique" },
            { word: "小心翼翼", pinyin: "xiǎo xīn yì yì", cn: "非常小心。", en: "very carefully" },
            { word: "手足无措", pinyin: "shǒu zú wú cuò", cn: "形容慌乱。", en: "at a loss" },
            { word: "冤枉", pinyin: "yuān wang", cn: "受到不公平待遇。", en: "accuse wrongly" },
            { word: "推荐", pinyin: "tuī jiàn", cn: "介绍。", en: "to recommend" },
            { word: "捣乱", pinyin: "dǎo luàn", cn: "进行破坏。", en: "to disturb" },
            { word: "人缘", pinyin: "rén yuán", cn: "与周围人的关系。", en: "relations" },
            { word: "口头禅", pinyin: "kǒu tóu chán", cn: "习惯语。", en: "catchphrase" },
            { word: "抵挡", pinyin: "dǐ dǎng", cn: "挡住；阻挡。", en: "to resist" },
            { word: "拉扯", pinyin: "lā che", cn: "用力拉住。", en: "to pull" }
        ];

        const fillerPool = "的一是在了我不有个他这到们中上大为国地来以成行时用后".split('');

        // --- 2. 核心变量 ---
        let board = [];
        let score = 0;
        let timeLeft = 300; // 5分钟
        let timerPtr = null;
        let selectedIdx = null;
        let targetWords = [];
        let isPaused = false;

        // 加载历史最高分
        window.onload = () => {
            const savedName = localStorage.getItem('lastPlayer');
            const savedScore = localStorage.getItem('highScore') || 0;
            if(savedName) {
                document.getElementById('player-name').value = savedName;
                document.getElementById('hiscore-msg').innerText = `上次玩家: ${savedName} | 最高分: ${savedScore}`;
            }
        };

        // --- 3. 游戏逻辑 ---
        function startGame() {
            const name = document.getElementById('player-name').value.trim();
            if(!name) return alert("请输入姓名！");
            
            localStorage.setItem('lastPlayer', name);
            document.getElementById('display-name').innerText = name;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            
            initBoard();
            startTimer();
        }

        function initBoard() {
            // 随机选20个词
            targetWords = [...wordBank].sort(() => Math.random() - 0.5).slice(0, 20);
            let chars = [];
            targetWords.forEach(v => v.word.split('').forEach(c => chars.push({ char: c, wordObj: v, isTarget: true })));
            
            // 填满 8x8 = 64 格
            while(chars.length < 64) {
                chars.push({ char: fillerPool[Math.floor(Math.random()*fillerPool.length)], isTarget: false });
            }
            board = chars.sort(() => Math.random() - 0.5);
            render();
        }

        function render() {
            const container = document.getElementById('game-board');
            container.innerHTML = '';
            board.forEach((tile, i) => {
                const div = document.createElement('div');
                div.className = `tile ${!tile.isTarget ? 'filler' : ''} ${selectedIdx === i ? 'selected' : ''}`;
                div.innerText = tile.char;
                div.onclick = () => handleTileClick(i);
                container.appendChild(div);
            });
            checkMatches();
        }

        function handleTileClick(idx) {
            if(isPaused) return;
            if(selectedIdx === null) {
                selectedIdx = idx;
            } else {
                const r1 = Math.floor(selectedIdx/8), c1 = selectedIdx%8, r2 = Math.floor(idx/8), c2 = idx%8;
                // 只能交换相邻
                if(Math.abs(r1-r2) + Math.abs(c1-c2) === 1) {
                    [board[selectedIdx], board[idx]] = [board[idx], board[selectedIdx]];
                    selectedIdx = null;
                } else {
                    selectedIdx = idx; // 换选
                }
            }
            render();
        }

        function checkMatches() {
            targetWords.forEach((v, vIdx) => {
                let foundIndices = [];
                // 横向扫
                for (let r = 0; r < 8; r++) {
                    let rowStr = "";
                    for (let c = 0; c < 8; c++) rowStr += board[r*8+c].char;
                    const s = rowStr.indexOf(v.word);
                    if(s !== -1) {
                        for(let i=0; i<v.word.length; i++) foundIndices.push(r*8+s+i);
                    }
                }
                // 纵向扫
                if(foundIndices.length === 0) {
                    for (let c = 0; c < 8; c++) {
                        let colStr = "";
                        for (let r = 0; r < 8; r++) colStr += board[r*8+c].char;
                        const s = colStr.indexOf(v.word);
                        if(s !== -1) {
                            for(let i=0; i<v.word.length; i++) foundIndices.push((s+i)*8+c);
                        }
                    }
                }

                if(foundIndices.length > 0) {
                    isPaused = true;
                    foundIndices.forEach(i => document.querySelectorAll('.tile')[i].classList.add('matched'));
                    setTimeout(() => showModal(v, vIdx, foundIndices), 600);
                }
            });
        }

        function showModal(v, vIdx, indices) {
            document.getElementById('m-word').innerText = v.word;
            document.getElementById('m-pinyin').innerText = v.pinyin;
            document.getElementById('m-cn').innerText = v.cn;
            document.getElementById('m-en').innerText = v.en;
            document.getElementById('study-modal').style.display = 'flex';
            
            // 消除逻辑：填充新干扰字
            indices.forEach(i => {
                board[i] = { char: fillerPool[Math.floor(Math.random()*fillerPool.length)], isTarget: false };
            });
            targetWords.splice(vIdx, 1);
            score += 5;
            document.getElementById('score').innerText = score;
        }

        function closeModal() {
            document.getElementById('study-modal').style.display = 'none';
            isPaused = false;
            render();
            if(score >= 100) endGame(true);
        }

        function startTimer() {
            timerPtr = setInterval(() => {
                if(isPaused) return;
                timeLeft--;
                let m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if(timeLeft <= 0) endGame(false);
            }, 1000);
        }

        function endGame(win) {
            clearInterval(timerPtr);
            const oldScore = localStorage.getItem('highScore') || 0;
            if(score > oldScore) localStorage.setItem('highScore', score);
            
            alert(win ? `🎉 恭喜达成100分！` : `⏰ 时间到！最终得分: ${score}`);
            location.reload();
        }
    </script>
</body>
</html>
